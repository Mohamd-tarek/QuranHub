  <div class="row  justify-content-end m-2" >
    <select class="form-select " aria-label="Default select example" [(ngModel)]="curSura" >
      <option  *ngFor="let sura of suras" value={{sura.index}} > {{sura.name}} - {{sura.index }}</option>
    </select> 
  </div>
  <div class="row  justify-content-end m-2" >
    <select class="form-select " aria-label="Default select example" [(ngModel)]="curAya" >
      <option  *ngFor="let aya of ayas" value={{aya}} > {{aya}}</option>
    </select> 
  </div>
  <div class="row align-items-start   p-2" >
    <noteText></noteText>
  </div> 
  <div class="row">
    <span class="m-auto w-auto">
      <i class="fa-solid fa-circle-chevron-left m-2" (click)="prev()"></i>
      <i class="fa-solid fa-circle-chevron-right m-2" (click)="next()"></i>
    </span>
  </div>
