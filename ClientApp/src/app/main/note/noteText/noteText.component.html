<p class="text-end rounded p-2" style="overflow : auto; height: 17vh; background-color: aliceblue">
    {{aya?.text ?? "loading..."}}
</p>

<div *ngIf="!edit">
    <p class="text-end p-2 rounded" style="overflow : auto; height: 17vh; background-color: aliceblue">
        {{note?.text ?? "loading..."}}
    </p>
    <button type="button"  class="btn btn-primary" (click)="edit = true" >
        edit
    </button>
</div>

<div *ngIf="edit">
    <textarea class="form-control p-2 rounded"  [(ngModel)]="note.text" ></textarea>
    <button type="button" *ngIf="edit" class="btn btn-warning m-2" (click)="saveNote()">
        save
    </button>
</div>
