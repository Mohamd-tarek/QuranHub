    <div *ngIf="dataLoaded; else nodata" >
        <div>
            <input id="word" type="checkbox" [formControl]="showLetters">
            <label for="word" class="m-2"> show letters </label>
        </div>
        <container [data]="getElements()" [col]="6"></container>
        <pagination *ngIf="!showLetters.value" [numOfLinks]="numOfLinks"></pagination>
    </div>

    <ng-template #nodata>
        <h4 class="m-2">Loading Data...</h4>
    </ng-template>
